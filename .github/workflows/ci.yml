name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Step 1: Build Docker image locally
      - name: Docker Build
        uses: DevOpsVyaspeeth/shared-actions/actions/docker-build@main
        id: docker
        with:
          acr-name: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          image-name: 'sample-app'
          image-tag: ${{ github.sha }}

      # Step 2: MSDO scan (source, Dockerfile, IaC, dependencies)
      # Includes its own PR comment (header: msdo-scan) and security gate
      - name: MSDO Scan
        uses: DevOpsVyaspeeth/shared-actions/actions/msdo-scan@main
        id: msdo

      # Step 3: Trivy scan on the built Docker image
      # Includes its own PR comment (header: trivy-scan) and security gate
      - name: Trivy Scan
        uses: DevOpsVyaspeeth/shared-actions/actions/trivy-scan@main
        id: trivy
        with:
          image-ref: ${{ steps.docker.outputs.image-ref }}

      # Step 4: Push to ACR only after scans pass
      - name: Docker Push to ACR
        if: success()
        uses: DevOpsVyaspeeth/shared-actions/actions/docker-push@main
        with:
          azure-creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          acr-name: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          image-ref: ${{ steps.docker.outputs.image-ref }}
