name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  # Job 1: MSDO scan (source, Dockerfile, IaC, dependencies)
  # Runs in PARALLEL with build-scan-push (does not need the Docker image)
  msdo-scan:
    # if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MSDO Scan
        uses: DevOpsVyaspeeth/shared-actions/actions/msdo-scan@main
        id: msdo

  # Job 2: Build Docker image → Trivy scan → Push to ACR
  # All three share the same runner and Docker daemon — no artifact overhead
  build-scan-push:
    # if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="v0.1.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Calculated version: ${NEW_VERSION}"

      - name: Set image ref
        id: image
        run: |
          IMAGE_REF="${{ secrets.AZURE_CONTAINER_REGISTRY }}/sample-app:${{ steps.semver.outputs.version }}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT

      - name: Docker Build
        uses: DevOpsVyaspeeth/shared-actions/actions/docker-build@main
        with:
          acr-name: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          image-name: 'sample-app'
          image-tag: ${{ steps.semver.outputs.version }}

      - name: Trivy Scan
        id: trivy-scan
        run: |
          # Install Trivy
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y
          
          # Run Trivy scan
          trivy image --format json --output trivy-results.json ${{ steps.image.outputs.image_ref }} || true
          trivy image --format table ${{ steps.image.outputs.image_ref }}

      - name: Parse Trivy Results
        if: always()
        id: parse-trivy
        run: |
          if [ -f "trivy-results.json" ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "LOW")] | length' trivy-results.json)
            TOTAL=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-results.json)
            
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
            echo "low=$LOW" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "high=0" >> $GITHUB_OUTPUT
            echo "medium=0" >> $GITHUB_OUTPUT
            echo "low=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate Trivy Summary
        if: always()
        run: |
          echo "## Trivy (Docker Image Scan)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${{ steps.parse-trivy.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| High | ${{ steps.parse-trivy.outputs.high }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Medium | ${{ steps.parse-trivy.outputs.medium }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Low | ${{ steps.parse-trivy.outputs.low }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **${{ steps.parse-trivy.outputs.total }}** |" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Trivy Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const critical = parseInt('${{ steps.parse-trivy.outputs.critical }}') || 0;
            const high = parseInt('${{ steps.parse-trivy.outputs.high }}') || 0;
            const medium = parseInt('${{ steps.parse-trivy.outputs.medium }}') || 0;
            const low = parseInt('${{ steps.parse-trivy.outputs.low }}') || 0;
            const total = parseInt('${{ steps.parse-trivy.outputs.total }}') || 0;
            const criticalPlusHigh = critical + high;
            
            const comment = `## 🛡️ Trivy (Docker Image Scan)
            
            | Severity | Count |
            |----------|-------|
            | Critical | ${critical} |
            | High | ${high} |
            | Medium | ${medium} |
            | Low | ${low} |
            | **Total** | **${total}** |
            
            ---
            📊 **Image:** \`${{ steps.image.outputs.image_ref }}\`
            ⚠️ **Critical + High:** ${critical} + ${high} = **${criticalPlusHigh}**
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Trivy Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: trivy-results.json
          retention-days: 30

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype Vulnerability Scan
        id: grype-scan
        run: |
          grype ${{ steps.image.outputs.image_ref }} -o json > grype-results.json || true
          grype ${{ steps.image.outputs.image_ref }} -o table

      - name: Parse Grype Results
        if: always()
        id: parse-grype
        run: |
          if [ -f "grype-results.json" ]; then
            CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-results.json)
            HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-results.json)
            MEDIUM=$(jq '[.matches[] | select(.vulnerability.severity == "Medium")] | length' grype-results.json)
            LOW=$(jq '[.matches[] | select(.vulnerability.severity == "Low")] | length' grype-results.json)
            TOTAL=$(jq '.matches | length' grype-results.json)
            
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
            echo "low=$LOW" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          else
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "high=0" >> $GITHUB_OUTPUT
            echo "medium=0" >> $GITHUB_OUTPUT
            echo "low=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate Grype Summary
        if: always()
        run: |
          echo "## Grype (Docker Image Scan)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${{ steps.parse-grype.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| High | ${{ steps.parse-grype.outputs.high }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Medium | ${{ steps.parse-grype.outputs.medium }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Low | ${{ steps.parse-grype.outputs.low }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **${{ steps.parse-grype.outputs.total }}** |" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Grype Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const critical = parseInt('${{ steps.parse-grype.outputs.critical }}') || 0;
            const high = parseInt('${{ steps.parse-grype.outputs.high }}') || 0;
            const medium = parseInt('${{ steps.parse-grype.outputs.medium }}') || 0;
            const low = parseInt('${{ steps.parse-grype.outputs.low }}') || 0;
            const total = parseInt('${{ steps.parse-grype.outputs.total }}') || 0;
            const criticalPlusHigh = critical + high;
            
            const comment = `## 🔍 Grype (Docker Image Scan)
            
            | Severity | Count |
            |----------|-------|
            | Critical | ${critical} |
            | High | ${high} |
            | Medium | ${medium} |
            | Low | ${low} |
            | **Total** | **${total}** |
            
            ---
            📊 **Image:** \`${{ steps.image.outputs.image_ref }}\`
            ⚠️ **Critical + High:** ${critical} + ${high} = **${criticalPlusHigh}**
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Grype Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-vulnerability-report
          path: grype-results.json
          retention-days: 30

      - name: Comment PR with Combined Scan Comparison
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const trivyCritical = parseInt('${{ steps.parse-trivy.outputs.critical }}') || 0;
            const trivyHigh = parseInt('${{ steps.parse-trivy.outputs.high }}') || 0;
            const trivyMedium = parseInt('${{ steps.parse-trivy.outputs.medium }}') || 0;
            const trivyLow = parseInt('${{ steps.parse-trivy.outputs.low }}') || 0;
            const trivyTotal = parseInt('${{ steps.parse-trivy.outputs.total }}') || 0;
            
            const grypeCritical = parseInt('${{ steps.parse-grype.outputs.critical }}') || 0;
            const grypeHigh = parseInt('${{ steps.parse-grype.outputs.high }}') || 0;
            const grypeMedium = parseInt('${{ steps.parse-grype.outputs.medium }}') || 0;
            const grypeLow = parseInt('${{ steps.parse-grype.outputs.low }}') || 0;
            const grypeTotal = parseInt('${{ steps.parse-grype.outputs.total }}') || 0;
            
            const comment = `## 📊 Vulnerability Scan Comparison
            
            ### Side-by-Side Analysis
            
            | Severity | 🛡️ Trivy | 🔍 Grype | Δ Difference |
            |----------|----------|----------|--------------|
            | Critical | ${trivyCritical} | ${grypeCritical} | ${grypeCritical - trivyCritical} |
            | High | ${trivyHigh} | ${grypeHigh} | ${grypeHigh - trivyHigh} |
            | Medium | ${trivyMedium} | ${grypeMedium} | ${grypeMedium - trivyMedium} |
            | Low | ${trivyLow} | ${grypeLow} | ${grypeLow - trivyLow} |
            | **Total** | **${trivyTotal}** | **${grypeTotal}** | **${grypeTotal - trivyTotal}** |
            
            ### Summary
            - 🛡️ **Trivy Critical + High:** ${trivyCritical + trivyHigh}
            - 🔍 **Grype Critical + High:** ${grypeCritical + grypeHigh}
            - 📊 **Image:** \`${{ steps.image.outputs.image_ref }}\`
            
            > **Note:** Different scanners may report different vulnerability counts due to varying databases and detection methods.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check Vulnerability Threshold
        if: always()
        run: |
          CRITICAL=${{ steps.parse-grype.outputs.critical }}
          HIGH=${{ steps.parse-grype.outputs.high }}
          
          if [ "$CRITICAL" != "0" ] || [ "$HIGH" != "0" ]; then
            echo "::warning::Found $CRITICAL critical and $HIGH high severity vulnerabilities"
            echo "::notice::Threshold check: Would fail on critical or high vulnerabilities in production"
            # exit 1  # Uncomment to fail the build
          fi

      - name: Docker Push to ACR
        if: success()
        uses: DevOpsVyaspeeth/shared-actions/actions/docker-push@main
        with:
          azure-creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          acr-name: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          image-ref: ${{ steps.image.outputs.image_ref }}

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.semver.outputs.version }}
          git push origin ${{ steps.semver.outputs.version }}

  # Job 3: Create GitHub Release with the semver tag
  release:
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-scan-push.outputs.semver }}
          name: Release ${{ needs.build-scan-push.outputs.semver }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
