name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  # Job 1: MSDO scan (source, Dockerfile, IaC, dependencies)
  # Runs in PARALLEL with build-scan-push (does not need the Docker image)
  msdo-scan:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MSDO Scan
        uses: DevOpsVyaspeeth/shared-actions/actions/msdo-scan@main
        id: msdo

  # Job 2: Build Docker image → Trivy scan → Push to ACR
  # All three share the same runner and Docker daemon — no artifact overhead
  build-scan-push:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="v0.1.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Calculated version: ${NEW_VERSION}"

      - name: Set image ref
        id: image
        run: |
          IMAGE_REF="${{ secrets.AZURE_CONTAINER_REGISTRY }}/sample-app:${{ steps.semver.outputs.version }}"
          echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT

      - name: Docker Build
        uses: DevOpsVyaspeeth/shared-actions/actions/docker-build@main
        with:
          acr-name: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          image-name: 'sample-app'
          image-tag: ${{ steps.semver.outputs.version }}

      # - name: Trivy Scan
      #   uses: DevOpsVyaspeeth/shared-actions/actions/trivy-scan@main
      #   id: trivy
      #   with:
      #     image-ref: ${{ steps.image.outputs.image_ref }}

      - name: Grype Vulnerability Scan
        id: grype-scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.image.outputs.image_ref }}
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-container-scan

      - name: Docker Push to ACR
        if: success()
        uses: DevOpsVyaspeeth/shared-actions/actions/docker-push@main
        with:
          azure-creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          acr-name: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          image-ref: ${{ steps.image.outputs.image_ref }}

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.semver.outputs.version }}
          git push origin ${{ steps.semver.outputs.version }}

  # Job 3: Create GitHub Release with the semver tag
  release:
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-scan-push.outputs.semver }}
          name: Release ${{ needs.build-scan-push.outputs.semver }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
