name: build-scan-and-push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write
  pull-requests: write

jobs:
  build_scan_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login to Azure using service principal (client secret)
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Azure CLI - show account
        run: az account show

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/sample-app:${IMAGE_TAG} .

      # MSDO: Runs all tools (Trivy, checkov, Bandit, BinSkim, ESLint, templateanalyzer)
      # Scans source code, Dockerfile, IaC, and dependencies
      - name: Run Microsoft Security DevOps
        uses: microsoft/security-devops-action@latest
        id: msdo

      - name: Upload MSDO results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.msdo.outputs.sarifFile }}
          category: 'msdo'

      # Trivy standalone: scans the BUILT Docker image (OS packages + app deps)
      # MSDO's Trivy only scans the filesystem, not the built image
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3

      - name: Trivy image scan (table + SARIF)
        run: |
          IMAGE="${{ secrets.AZURE_CONTAINER_REGISTRY }}/sample-app:${{ github.sha }}"
          echo "=== Trivy Table Output ==="
          trivy image --severity CRITICAL,HIGH,MEDIUM --format table "$IMAGE"
          echo "=== Generating SARIF ==="
          trivy image --format sarif --output trivy-results.sarif "$IMAGE"

      - name: Upload Trivy image results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-image'

      - name: Generate scan summary
        if: github.event_name == 'pull_request'
        id: scan-summary
        run: |
          # Parse MSDO SARIF
          MSDO_SARIF="${{ steps.msdo.outputs.sarifFile }}"
          if [ -f "$MSDO_SARIF" ]; then
            MSDO_CRITICAL=$(jq '[.runs[].results[] | select(.level=="error" and (.properties."security-severity" // "0" | tonumber >= 9.0))] | length' "$MSDO_SARIF" 2>/dev/null || echo 0)
            MSDO_HIGH=$(jq '[.runs[].results[] | select(.level=="error")] | length' "$MSDO_SARIF" 2>/dev/null || echo 0)
            MSDO_MEDIUM=$(jq '[.runs[].results[] | select(.level=="warning")] | length' "$MSDO_SARIF" 2>/dev/null || echo 0)
            MSDO_LOW=$(jq '[.runs[].results[] | select(.level=="note")] | length' "$MSDO_SARIF" 2>/dev/null || echo 0)
            MSDO_TOTAL=$(jq '[.runs[].results[]] | length' "$MSDO_SARIF" 2>/dev/null || echo 0)
          else
            MSDO_CRITICAL=0; MSDO_HIGH=0; MSDO_MEDIUM=0; MSDO_LOW=0; MSDO_TOTAL=0
          fi

          # Parse Trivy SARIF
          if [ -f "trivy-results.sarif" ]; then
            TRIVY_CRITICAL=$(jq '[.runs[].results[] | select(.level=="error" and (.properties."security-severity" // "0" | tonumber >= 9.0))] | length' trivy-results.sarif 2>/dev/null || echo 0)
            TRIVY_HIGH=$(jq '[.runs[].results[] | select(.level=="error")] | length' trivy-results.sarif 2>/dev/null || echo 0)
            TRIVY_MEDIUM=$(jq '[.runs[].results[] | select(.level=="warning")] | length' trivy-results.sarif 2>/dev/null || echo 0)
            TRIVY_LOW=$(jq '[.runs[].results[] | select(.level=="note")] | length' trivy-results.sarif 2>/dev/null || echo 0)
            TRIVY_TOTAL=$(jq '[.runs[].results[]] | length' trivy-results.sarif 2>/dev/null || echo 0)
          else
            TRIVY_CRITICAL=0; TRIVY_HIGH=0; TRIVY_MEDIUM=0; TRIVY_LOW=0; TRIVY_TOTAL=0
          fi

          # Build comment body (no leading spaces so markdown renders correctly)
          {
            echo "## Security Scan Summary"
            echo ""
            echo "### MSDO (Source & IaC Scan)"
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| Critical | ${MSDO_CRITICAL} |"
            echo "| High | ${MSDO_HIGH} |"
            echo "| Medium | ${MSDO_MEDIUM} |"
            echo "| Low | ${MSDO_LOW} |"
            echo "| **Total** | **${MSDO_TOTAL}** |"
            echo ""
            echo "### Trivy (Docker Image Scan)"
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| Critical | ${TRIVY_CRITICAL} |"
            echo "| High | ${TRIVY_HIGH} |"
            echo "| Medium | ${TRIVY_MEDIUM} |"
            echo "| Low | ${TRIVY_LOW} |"
            echo "| **Total** | **${TRIVY_TOTAL}** |"
          } > pr-comment.md

          # Export counts for gate step
          echo "msdo_high=${MSDO_HIGH}" >> $GITHUB_OUTPUT
          echo "trivy_high=${TRIVY_HIGH}" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr-comment.md

      - name: Security gate - block PR on HIGH vulnerabilities
        if: github.event_name == 'pull_request'
        run: |
          MSDO_HIGH=${{ steps.scan-summary.outputs.msdo_high || 0 }}
          TRIVY_HIGH=${{ steps.scan-summary.outputs.trivy_high || 0 }}
          THRESHOLD=1
          echo "MSDO HIGH: ${MSDO_HIGH}, Trivy HIGH: ${TRIVY_HIGH}, Threshold: ${THRESHOLD}"
          if [ "${MSDO_HIGH}" -gt "${THRESHOLD}" ] || [ "${TRIVY_HIGH}" -gt "${THRESHOLD}" ]; then
            echo "::error::Security gate FAILED - HIGH vulnerability count exceeds threshold (${THRESHOLD})"
            echo "MSDO HIGH: ${MSDO_HIGH}, Trivy HIGH: ${TRIVY_HIGH}"
            exit 1
          fi
          echo "Security gate PASSED"

      - name: Login to ACR
        run: |
          az acr login --name $(echo ${{ secrets.AZURE_CONTAINER_REGISTRY }} | cut -d'.' -f1)

      - name: Push image to ACR
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/sample-app:${IMAGE_TAG}
